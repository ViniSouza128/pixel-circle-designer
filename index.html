<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Circle Generator - Interactive Pixel Art Tool</title>
<meta name="description" content="Interactive pixel circle generator for pixel art and grid-based design. Create perfect circles and ellipses with real-time visualization and multiple rendering methods.">

<meta name="keywords" content="pixel,circle,generator,minecraft,pixel circle generator, pixel art circle, circle generator, ellipse, ellipse generator">

<meta property="og:title" content="Pixel Circle Generator">
<meta property="og:description" content="Create pixel-perfect circles and ellipses with real-time visualization.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://vinisouza128.github.io/pixel-circle-designer/">
<meta name="robots" content="index, follow">
<meta name="google-site-verification" content="tWk0XqTqJEx0DmXenoD69pr9xXm-9cT386BGu6fEX54" />
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0b0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg:#0b0b0f; --surface:rgba(255,255,255,0.04);
    --border:rgba(224,48,48,0.32); --border-hi:rgba(224,48,48,0.72);
    --red:#e03030; --red-lt:#ff8080; --red-dim:rgba(224,48,48,0.16);
    --gl:#1e1e2c; --muted:#4a4666; --text:#d4d0ef; --text-hi:#ffffff;
    --radius:12px; --thumb:60px; --btn:44px; --gap:8px;
  }
  html[data-theme="light"] {
    --bg:#f2ede2; --surface:rgba(0,0,0,0.04);
    --border:rgba(170,30,30,0.30); --border-hi:rgba(170,30,30,0.68);
    --red:#cc2020; --red-lt:#dd4444; --red-dim:rgba(200,32,32,0.14);
    --gl:#bfb8a8; --muted:#8a7060; --text:#2a1f1a; --text-hi:#0a0506;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;transition:background .25s,color .25s;}

  /* ═══════════ PORTRAIT ═══════════ */
  body{display:flex;flex-direction:column;align-items:center;padding:0 2dvw 2dvh;overflow:hidden;max-width:100dvw;}

  #header-area{
  flex-shrink:0;
  width:100%;
  display:flex;
  justify-content:center;

  margin-top:1.5dvh;
  margin-bottom:var(--gap);
}
  #h1p{font-family:'Press Start 2P',monospace;font-size:3.5dvh;color:var(--muted);white-space:nowrap;line-height:1.2;}
  /* item 2: landscape title same colour as portrait title */
  body.ls #h1-ls{font-family:'Press Start 2P',monospace;font-size:3dvh;color:var(--muted);white-space:nowrap;line-height:1.2;}
  /* item 1: mode-word — underline on the whole word (parent), letters animate individually */
  .mode-word{
    cursor:pointer;
    display:inline-flex;
    white-space:nowrap;
    text-decoration:none;
    text-decoration-style:dotted;
    text-underline-offset:4px;
    /* text-decoration-skip-ink off so the dotted line is fully continuous */
    text-decoration-skip-ink:none;
  }
  .mode-word:hover .mw-letter{color:var(--red-lt);}
  html[data-theme="light"] .mode-word:hover .mw-letter{color:var(--red);}
  .mw-letter{
    position: relative;
    display:inline-block;
    color:inherit;
    /* NO text-decoration on individual letters — handled by parent */
    animation: mw-wave 5.5s ease-in-out infinite;
    animation-delay: calc(var(--i,0) * 0.10s);
  }
  .mw-letter::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;

  width:100%;
  height:4px;

  /* 🔥 o segredo */
  background: radial-gradient(circle, currentColor 2px, transparent 2.5px);
  background-size: 10px 4px;
  background-repeat: repeat-x;

  pointer-events:none;
}
  @keyframes mw-wave {
    /* Long rest, brief gentle bounce */
    0%,  62%, 100% { transform: translateY(0); }
    68%            { transform: translateY(-18%); }
    74%            { transform: translateY(0); }
  }
  #h1-ls{display:none;}

  /* Canvas wrap: flex:1 fills remaining height; portrait always square via JS */
  #canvas-wrap{flex:1 1 0;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  /* Portrait: frame sized by JS (always square). Landscape: fills grid cell via CSS flex */
  #canvas-frame{position:relative;border:1px solid var(--gl);border-radius:var(--radius);overflow:hidden;flex-shrink:1;display:inline-flex;align-items:stretch;}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

  /* Gaps */
  #gap-render{height:var(--gap);flex-shrink:0;}
  #gap1      {height:var(--gap);flex-shrink:0;}
  #gap2      {height:var(--gap);flex-shrink:0;}
  body.ellipse #gap-render,body.ellipse #gap1,body.ellipse #gap2{height:5px;}

  /* Pill rows — single unified box with internal hitboxes */
  #render-row,#algo-row{
    flex-shrink:0;display:flex;justify-content:stretch;gap:0;align-items:stretch;
    height:52px;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden; /* clips children to rounded corners */
    transition:border-color .15s;
  }
  body.ellipse #render-row,body.ellipse #algo-row{height:42px;}

  /* Individual options: no border, no bg by default; thin separator between them */
  .rnd-opt,.algo-opt{
    flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;padding:4px 5px;border-radius:0;
    border:none;border-right:1px solid var(--border);
    background:transparent;
    transition:background .15s;user-select:none;overflow:hidden;
  }
  .rnd-opt:last-child,.algo-opt:last-child{border-right:none;}
  .rnd-opt:hover,.algo-opt:hover{background:rgba(224,48,48,.10);}
  .rnd-opt.active,.algo-opt.active{background:var(--red-dim);}
  .rnd-icon{font-size:.95rem;line-height:1;color:var(--muted);transition:color .15s;flex-shrink:0;}
  .rnd-opt.active .rnd-icon{color:var(--red-lt);}
  .rnd-name,.algo-name{font-size:.85rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap;transition:color .15s;max-width:100%;overflow:hidden;}
  .rnd-opt.active .rnd-name,.algo-opt.active .algo-name{color:var(--red-lt);}
  .algo-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;transition:background .15s,border-color .15s;}
  .algo-opt.active .algo-dot{background:var(--red);border-color:var(--red-lt);}

  /* Slider boxes */
  #diam-boxes-row{flex-shrink:0;display:flex;flex-direction:column;gap:5px;width:100%;}
  .diam-box{
    display:flex;flex-direction:column;align-items:center;overflow:hidden;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:0 14px 5px;flex-shrink:0;
  }
  /* Circle mode single slider */
  #box-size{height:calc(var(--thumb)+38px);}
  /* Ellipse: 2 compact sliders */
  body.ellipse .diam-box{--thumb:44px;height:calc(var(--thumb)+30px);}

  .diam-slider-wrap{width:100%;position:relative;padding:calc(var(--thumb)/2) 0;}
  input.diamRange{-webkit-appearance:none;appearance:none;width:100%;height:13px;border-radius:6px;outline:none;cursor:pointer;display:block;background:linear-gradient(to right,var(--red) 0%,var(--red) var(--pct,0%),var(--gl) var(--pct,0%),var(--gl) 100%);}
  input.diamRange::-webkit-slider-thumb{-webkit-appearance:none;width:var(--thumb);height:var(--thumb);border-radius:50%;background:var(--red);border:2px solid var(--red-lt);cursor:pointer;}
  input.diamRange::-moz-range-thumb{width:var(--thumb);height:var(--thumb);border-radius:50%;background:var(--red);border:2px solid var(--red-lt);cursor:pointer;}
  .thumb-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
  .diam-label{font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:1px;white-space:nowrap;}

  /* Overlay */
  #diam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .12s;gap:2px;}
  #diam-overlay.visible{opacity:1;}
  #ov-diam{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(2rem,8vw,6rem);color:#ffffff;-webkit-text-stroke:3px rgba(0,0,0,0.55);text-stroke:3px rgba(0,0,0,0.55);paint-order:stroke fill;letter-spacing:-0.01em;line-height:1;display:flex;align-items:baseline;}
  html[data-theme="light"] #ov-diam{color:#1a0a0a;-webkit-text-stroke:3px rgba(255,255,255,0.55);}
  #ov-diam .sym{font-family:sans-serif;font-size:1.1em;font-weight:700;}
  #ov-rad{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(.75rem,2vw,1.6rem);color:rgba(255,255,255,.8);-webkit-text-stroke:2px rgba(0,0,0,0.45);text-stroke:2px rgba(0,0,0,0.45);paint-order:stroke fill;letter-spacing:.02em;line-height:1;}
  html[data-theme="light"] #ov-rad{color:rgba(20,5,5,.85);-webkit-text-stroke:2px rgba(255,255,255,0.45);}

  .surface{background:rgba(11,11,15,.88);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .15s,background .15s;}
  html[data-theme="light"] .surface{background:rgba(242,237,226,.92);}

  #canvas-btns-tl{position:absolute;top:8px;left:8px;display:flex;gap:6px;}
  #canvas-btns-tr{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
  /* BR: column; bottom row [circle+zoom] is wider than a single btn */
  #canvas-btns-br{position:absolute;bottom:8px;right:8px;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  #canvas-info{position:absolute;bottom:8px;left:8px;}

  .c-btn{width:var(--btn);height:var(--btn);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;color:var(--red-lt);}
  .c-btn:hover{border-color:var(--border-hi);background:rgba(224,48,48,.18);color:var(--text-hi);}
  .c-btn.active{background:rgba(224,48,48,.28);border-color:rgba(224,48,48,.72);color:var(--red-lt);}
  html[data-theme="light"] .c-btn{color:var(--red);}
  html[data-theme="light"] .c-btn.active{background:var(--red-dim);border-color:var(--border-hi);color:var(--red);}
  html[data-theme="light"] .c-btn:hover{background:var(--red-dim);color:var(--red);}

  #info-btn{width:var(--btn);height:var(--btn);font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;color:var(--red-lt);}
  #info-btn:hover{border-color:var(--border-hi);color:var(--text-hi);}
  #info-btn.active{background:rgba(224,48,48,.28);border-color:rgba(224,48,48,.72);color:var(--red-lt);}
  html[data-theme="light"] #info-btn{color:var(--red);}
  html[data-theme="light"] #info-btn.active{background:var(--red-dim);border-color:var(--border-hi);color:var(--red);}

  #info-chip{display:none;flex-direction:column;justify-content:center;padding:0 11px;font-weight:700;color:var(--red-lt);letter-spacing:.04em;line-height:1.6;white-space:nowrap;cursor:pointer;height:calc(var(--btn)*2);overflow:hidden;}
  /* item 4: area expression muted helper class */
  .area-muted{color:var(--muted);}
  #info-chip div{white-space:nowrap;}
  #info-chip.open{display:flex;}
  #info-chip:hover{border-color:var(--border-hi);}
  html[data-theme="light"] #info-chip{color:var(--red);}

  /* ═══════════ LANDSCAPE ═══════════ */
  body.ls{
    display:grid;
    /* Right column explicitly sized to not let canvas overflow it */
    grid-template-columns: clamp(50px,7dvw,82px) 1fr clamp(50px,7dvw,82px);
    grid-template-rows:auto 1fr auto;
    grid-template-areas:". title ." "left canvas right" ". slider .";
    padding:1.5dvh 2dvw;gap:8px;align-items:stretch;flex-direction:unset;
    overflow:hidden;max-width:100dvw;
  }
  body.ls #header-area{display:none!important;}
  body.ls #gap-render,body.ls #gap1,body.ls #gap2{display:none!important;}
  body.ls #h1-ls{display:block;align-self:center;justify-self:center;font-family:'Press Start 2P',monospace;font-size:3dvh;color:var(--muted);white-space:nowrap;line-height:1.2;}
  /* canvas-wrap fills its grid cell; frame fills wrap */
  body.ls #canvas-wrap{grid-area:canvas;overflow:hidden;min-width:0;min-height:0;display:flex;align-items:stretch;justify-content:stretch;flex:unset;width:unset;}
  /* Frame fills wrap completely; canvas is centered inside via JS ox/oy */
  body.ls #canvas-frame{flex:1 1 0;min-width:0;min-height:0;border-radius:var(--radius);overflow:hidden;}
  /* Canvas element sized by JS, capped to frame size */
  body.ls canvas{max-width:100%;max-height:100%;}
  body.ls #render-row{grid-area:left;flex-direction:column;gap:0;align-items:stretch;justify-content:stretch;height:unset;}
  body.ls .rnd-opt{flex:1 1 0;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:5px 3px;min-height:0;overflow:hidden;border-right:none;border-bottom:1px solid var(--border);}
  body.ls .rnd-opt:last-child{border-bottom:none;}
  body.ls .rnd-icon{font-size:clamp(.8rem,2.2dvh,1.3rem);}
  body.ls .rnd-name{font-size:1rem;white-space:nowrap;overflow:hidden;max-width:100%;}
  body.ls #algo-row{grid-area:right;flex-direction:column;gap:0;align-items:stretch;justify-content:stretch;height:unset;}
  body.ls .algo-opt{flex:1 1 0;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:5px 3px;min-height:0;overflow:hidden;border-right:none;border-bottom:1px solid var(--border);}
  body.ls .algo-opt:last-child{border-bottom:none;}
  body.ls .algo-dot{width:11px;height:11px;}
  body.ls .algo-name{font-size:1rem;white-space:nowrap;overflow:hidden;max-width:100%;}
  body.ls #diam-boxes-row{grid-area:slider;flex-direction:row;gap:8px;}
  body.ls .diam-box{flex:1 1 0;padding:0 10px 4px;height:unset;--thumb:45px;}
  body.ls .diam-slider-wrap{padding:calc(var(--thumb)/2) 0;}
  body.ls input.diamRange{height:10px;border-radius:5px;}
  body.ls input.diamRange::-webkit-slider-thumb{width:var(--thumb);height:var(--thumb);}
  body.ls input.diamRange::-moz-range-thumb{width:var(--thumb);height:var(--thumb);}
  body.ls .diam-label{font-size:clamp(.4rem,1.3dvh,.85rem);margin-top:1px;}
  body.ls.ellipse .diam-box{--thumb:45px;}
  body.ls.ellipse #render-row,body.ls.ellipse #algo-row{height:unset;}
  
  #title-box{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;

  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);

  padding:12px clamp(12px, 4vw, 28px);
}

#title-box-ls{
  grid-area:title;
  display:flex;
  align-items:center;
  justify-content:center;

  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);

  padding:10px;
}
#title-box h1,
#title-box-ls h1{
  max-width:100%;
}
</style>
<link id="favicon" rel="icon" type="image/png" href="favicon_light.png">

<link rel="apple-touch-icon" href="favicon_light.png">
</head>
<body>

<div id="header-area">
  <div id="title-box">
    <h1 id="h1p">Pixel <span class="mode-word" id="modeToggleP"></span> Designer</h1>
  </div>
</div>

<div id="canvas-wrap">
  <div id="canvas-frame">
    <canvas id="c"></canvas>
    <div id="diam-overlay">
      <span id="ov-diam"><span class="sym"></span><span id="ov-num"></span></span>
      <span id="ov-rad"></span>
    </div>
    <div id="canvas-btns-tl">
      <button class="c-btn surface" id="btnTheme" title="Toggle light/dark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="7.1" y2="7.1"/><line x1="16.9" y1="16.9" x2="19.1" y2="19.1"/><line x1="19.1" y1="4.9" x2="16.9" y2="7.1"/><line x1="4.9" y1="19.1" x2="7.1" y2="16.9"/></svg>
      </button>
      <button class="c-btn surface active" id="btnGrid" title="Toggle grid">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="9" y1="2" x2="9" y2="22"/><line x1="15" y1="2" x2="15" y2="22"/><line x1="2" y1="9" x2="22" y2="9"/><line x1="2" y1="15" x2="22" y2="15"/></svg>
      </button>
    </div>
    <div id="canvas-btns-tr">
      <button class="c-btn surface" id="btnDownload" title="Download PNG">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="15"/><polyline points="7,10 12,15 17,10"/><line x1="4" y1="20" x2="20" y2="20"/></svg>
      </button>
    </div>
    <div id="canvas-btns-br">
      <button class="c-btn surface" id="btnCenter" title="Toggle center guides">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <div style="display:flex;gap:6px;">
        <button class="c-btn surface" id="btnCircle" title="Perfect circle/ellipse overlay">
          <svg width="20" height="20" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="13" cy="13" r="9"/></svg>
        </button>
        <button class="c-btn surface" id="btnZoom" title="Zoom top-left">
          <svg width="20" height="20" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7.5"/><line x1="17" y1="17" x2="23.5" y2="23.5"/><line x1="8.5" y1="11" x2="13.5" y2="11"/><line x1="11" y1="8.5" x2="11" y2="13.5"/></svg>
        </button>
      </div>
    </div>
    <div id="canvas-info">
      <button id="info-btn" class="surface" title="Info">i</button>
      <div id="info-chip" class="surface"></div>
    </div>
  </div>
</div>

<div id="gap-render"></div>
<div id="render-row">
  <label class="rnd-opt active" data-mode="filled"><span class="rnd-icon">●</span><span class="rnd-name">Filled</span><input type="radio" name="rmode" value="filled" checked hidden></label>
  <label class="rnd-opt" data-mode="thin"><span class="rnd-icon">○</span><span class="rnd-name">Thin</span><input type="radio" name="rmode" value="thin" hidden></label>
  <label class="rnd-opt" data-mode="thick"><span class="rnd-icon">◎</span><span class="rnd-name">Thick</span><input type="radio" name="rmode" value="thick" hidden></label>
</div>
<div id="gap1"></div>
<div id="algo-row">
  <label class="algo-opt active" data-algo="euclidean"><span class="algo-dot"></span><span class="algo-name">Euclidean</span><input type="radio" name="algo" value="euclidean" checked hidden></label>
  <label class="algo-opt" data-algo="bresenham"><span class="algo-dot"></span><span class="algo-name">Bresenham</span><input type="radio" name="algo" value="bresenham" hidden></label>
  <label class="algo-opt" data-algo="threshold"><span class="algo-dot"></span><span class="algo-name">Threshold</span><input type="radio" name="algo" value="threshold" hidden></label>
</div>
<div id="gap2"></div>

<div id="diam-boxes-row">
  <div class="diam-box" id="box-size">
    <div class="diam-slider-wrap" id="sw-size">
      <input class="diamRange" id="slSize" type="range" min="1" max="32" step="1" value="16">
      <canvas class="thumb-canvas" id="tc-size"></canvas>
    </div>
    <span class="diam-label">Size</span>
  </div>
  <div class="diam-box" id="box-width" style="display:none">
    <div class="diam-slider-wrap" id="sw-width">
      <input class="diamRange" id="slWidth" type="range" min="1" max="32" step="1" value="20">
      <canvas class="thumb-canvas" id="tc-width"></canvas>
    </div>
    <span class="diam-label">Width</span>
  </div>
  <div class="diam-box" id="box-height" style="display:none">
    <div class="diam-slider-wrap" id="sw-height">
      <input class="diamRange" id="slHeight" type="range" min="1" max="32" step="1" value="12">
      <canvas class="thumb-canvas" id="tc-height"></canvas>
    </div>
    <span class="diam-label">Height</span>
  </div>
</div>
<div id="title-box-ls">
  <h1 id="h1-ls">Pixel <span class="mode-word" id="modeToggleLS"></span> Designer</h1>

/* ── Layout decision ── */
function computeLayoutScores(){
  const W=window.innerWidth,H=window.innerHeight;
  // Portrait: header is now padding-based (~2.5dvh total), not fixed 11dvh
  const ptHdrH=H*0.045;    // ~title line + padding
  const ptPadB=H*0.02;
  const ptRowsH=52+52,ptGapsH=8*5,ptSlider=60+38;
  const ptFreeH=H-ptHdrH-ptPadB-ptRowsH-ptGapsH-ptSlider;
  const ptSide=Math.min(W*.96,ptFreeH);
  const sideCol=Math.min(82,Math.max(50,W*.07));
  const lsSideW=sideCol*2+W*.04+8*2;
  const lsFreeW=W-lsSideW,lsFreeH=H-H*.03-H*.04-8-45-38-8;
  return{pt:ptSide,ls:Math.min(lsFreeW,lsFreeH)};
}

/*
  item 3: In landscape, check if canvas+sidecols overflows window width.
  If the canvas pixel width (cW) would push total content beyond window,
  reduce cW so it fits. This is done by capping availW in getAvailableSpace.
  We detect overflow by comparing canvas+sidecol widths against innerWidth.
*/
function getLandscapeAvailW(){
  // The grid has: sidecol + gap + canvasArea + gap + sidecol + padding*2
  const W=window.innerWidth;
  const sideCol=Math.min(82,Math.max(50,W*.07));
  const pad=W*.04; // 2dvw each side
  const gaps=8*2;  // gap between grid columns
  const maxCanvasW=W - sideCol*2 - pad - gaps;
  return Math.max(maxCanvasW,60);
}
function applyLayout(){
  const{pt,ls}=computeLayoutScores();
  const HYST=6;
  if(!isLS&&ls>pt+HYST){isLS=true;bodyEl.classList.add('ls');}
  else if(isLS&&pt>ls+HYST){isLS=false;bodyEl.classList.remove('ls');}
}

/*
  ═══ GEOMETRY ════════════════════════════════════════════════════
  Portrait:  canvas is always a square (min of available W and H).
             The ellipse grid is centered inside via ox/oy.
             Controls use the full body width (not canvas width).
  Landscape: canvas fills the entire frame (availW × availH).
             ps = min(availW/Gc, availH/Gr) keeps cells square.
             ox/oy center the grid within the rectangular frame.
  ═════════════════════════════════════════════════════════════════
*/
function computeGeometry(availW,availH){
  // Portrait: canvas fills full body width AND available height (rectangular if needed)
  // ps = min(cW/G, cH/G) keeps grid cells square; circle centred via ox/oy
  if(isEllipse){
    const padX=getPad(diamW),padY=getPad(diamH);
    const Gc=diamW+padX*2,Gr=diamH+padY*2;
    const cW=Math.max(availW,60),cH=Math.max(availH,40);
    const ps=Math.min(cW/Gc,cH/Gr);
    return{ps,Gc,Gr,ox:(cW-Gc*ps)/2,oy:(cH-Gr*ps)/2,cW,cH};
  }else{
    const D=diamSize;if(!D)return null;
    const p=getPad(D),G=D+p*2;
    const cW=Math.max(availW,60),cH=Math.max(availH,40);
    const ps=Math.min(cW/G,cH/G);
    return{ps,Gc:G,Gr:G,ox:(cW-G*ps)/2,oy:(cH-G*ps)/2,cW,cH};
  }
}

function getAvailableSpace(){
  if(isLS){
    // Collapse canvas/frame so cWrap gives clean measurement
    mainCanvas.style.width='0';mainCanvas.style.height='0';
    cFrame.style.width='';cFrame.style.height='';
    const r=cWrap.getBoundingClientRect();
    // item 3: cap width so canvas never pushes beyond window
    const capW=getLandscapeAvailW();
    return{w:Math.min(Math.floor(r.width),capW),h:Math.floor(r.height)};
  }else{
    cFrame.style.width='0px';cFrame.style.height='0px';
    const r=cWrap.getBoundingClientRect();
    // item 2: canvas width = full body width always; height = available vertical space
    const bodyW=Math.floor(window.innerWidth*.96)-4;
    // cW = bodyW; cH = min(bodyW, available height) to keep cells square but width fills controls
    const availH=Math.max(Math.floor(r.height)-2,60);
    // Canvas is square at min(bodyW, availH), but width is always bodyW
    // Grid ps = min(bodyW,availH)/G — circle centred inside rectangular canvas via ox/oy
    return{w:bodyW, h:availH};
  }
}

/* ── Thumb drawing ── */
function drawThumb(slEl,tcEl,boxEl,val,max,subLabel){
  const wrap=slEl.parentElement;
  const r=wrap.getBoundingClientRect();if(!r.width)return;
  const T=getThumbPx(boxEl),dpr=window.devicePixelRatio||1;
  tcEl.width=Math.round(r.width*dpr);tcEl.height=Math.round(r.height*dpr);
  tcEl.style.width=r.width+'px';tcEl.style.height=r.height+'px';
  const tc=tcEl.getContext('2d');
  tc.setTransform(dpr,0,0,dpr,0,0);tc.clearRect(0,0,r.width,r.height);
  const trackW=r.width-T;
  const cx_t = T/2 + ((val - parseInt(slEl.min)) / (parseInt(slEl.max) - parseInt(slEl.min))) * trackW;
  const cy_t = r.height / 2;
  const numStr=String(val);
  const maxW=T*0.76;
  let fsMain=Math.max(4,Math.floor(T*0.36));
  let fsSub =Math.max(3,Math.floor(T*0.16));
  for(let iter=0;iter<12;iter++){
    tc.font=`700 ${fsMain}px sans-serif`;
    const sw=tc.measureText('⌀').width;
    tc.font=`700 ${fsMain}px "JetBrains Mono",monospace`;
    const nw=tc.measureText(numStr).width;
    if(sw+nw<=maxW)break;
    fsMain=Math.max(4,Math.floor(fsMain*0.85));
    fsSub =Math.max(3,Math.floor(fsSub *0.85));
  }
  tc.font=`700 ${fsMain}px sans-serif`;const symW=tc.measureText('⌀').width;
  tc.font=`700 ${fsMain}px "JetBrains Mono",monospace`;const numW=tc.measureText(numStr).width;
  const sx=cx_t-(symW+numW)/2;
  /* textBaseline='middle' draws text with its visual midpoint at y.
     Two-line: separate main and sub by (fsMain+fsSub)/2 + gap, both centred on cy_t */
  tc.textBaseline='middle';
  tc.fillStyle='#ffffff';
  if(!subLabel){
    tc.font=`700 ${fsMain}px sans-serif`;tc.fillText('⌀',sx,cy_t);
    tc.font=`700 ${fsMain}px "JetBrains Mono",monospace`;tc.fillText(numStr,sx+symW,cy_t);
  }else{
    const GAP=Math.max(2,Math.floor(T*0.04));
    const halfSep=(fsMain+fsSub)/2+GAP;
    const yMain=cy_t-halfSep/2;
    const ySub =cy_t+halfSep/2;
    tc.font=`700 ${fsMain}px sans-serif`;tc.fillText('⌀',sx,yMain);
    tc.font=`700 ${fsMain}px "JetBrains Mono",monospace`;tc.fillText(numStr,sx+symW,yMain);
    tc.fillStyle='rgba(255,255,255,.65)';tc.textAlign='center';
    tc.font=`700 ${fsSub}px "JetBrains Mono",monospace`;tc.fillText(subLabel,cx_t,ySub);
  }
}

/* ══ ALGORITHMS ══
   Bresenham for circles uses the original well-tested v26 algorithm.
   Bresenham for ellipses uses the correct midpoint ellipse scan-fill.
   Euclidean and Threshold are generalised for ellipses via rx/ry.
*/
function fillEuclidean(Gc,Gr,cx,cy,rx,ry,f){
  const rx2=rx*rx,ry2=ry*ry;
  for(let j=0;j<Gr;j++){
    const dy=j+.5-cy,dy2=dy*dy;
    if(dy2/ry2>=1)continue;
    const dxM=rx*Math.sqrt(1-dy2/ry2);
    const lo=Math.max(0,Math.ceil(cx-dxM-.5)),hi=Math.min(Gc-1,Math.floor(cx+dxM-.5));
    for(let i=lo;i<=hi;i++)f[j][i]=1;
  }
}

function fillBresenham(Gc,Gr,cx,cy,rx,ry,f){
  const isCircle=Math.abs(rx-ry)<0.01;
  const isEX=(cx===Math.floor(cx)),isEY=(cy===Math.floor(cy));

  if(isCircle){
    /* Original v26 circle algorithm — known correct */
    const iR=Math.floor(rx);
    if(iR===0){if(!isEX){const pi=Math.floor(cx),pj=Math.floor(cy);if(pi>=0&&pi<Gc&&pj>=0&&pj<Gr)f[pj][pi]=1;}return;}
    const rMin=new Int32Array(Gr).fill(Gc),rMax=new Int32Array(Gr).fill(-1);
    const span=(row,lo,hi)=>{
      if(row<0||row>=Gr||lo>hi)return;
      const l=Math.max(0,lo),r=Math.min(Gc-1,hi);
      if(l>r)return;if(l<rMin[row])rMin[row]=l;if(r>rMax[row])rMax[row]=r;
    };
    let x=0,y=iR,d=1-iR;
    while(x<=y){
      if(isEX){span(cy-y,cx-x,cx+x-1);span(cy+y-1,cx-x,cx+x-1);span(cy-x-1,cx-y,cx+y-1);span(cy+x,cx-y,cx+y-1);}
      else{const gcx=Math.floor(cx),gcy=Math.floor(cy);span(gcy+y,gcx-x,gcx+x);span(gcy-y,gcx-x,gcx+x);span(gcy+x,gcx-y,gcx+y);span(gcy-x,gcx-y,gcx+y);}
      if(d<0)d+=2*x+3;else{d+=2*(x-y)+5;y--;}x++;
    }
    for(let j=0;j<Gr;j++)for(let i=rMin[j];i<=rMax[j];i++)if(i>=0&&i<Gc)f[j][i]=1;
    return;
  }

  /* Ellipse: integer-radius midpoint algorithm, scan-fill */
  const a=Math.round(rx),b=Math.round(ry);
  if(a<1||b<1)return;
  const a2=a*a,b2=b*b;
  const rMin=Array.from({length:Gr},()=>Gc),rMax=Array.from({length:Gr},()=>-1);
  const addSpan=(row,lo,hi)=>{
    const rr=Math.floor(row);if(rr<0||rr>=Gr)return;
    const l=Math.max(0,Math.floor(lo)),h=Math.min(Gc-1,Math.floor(hi));
    if(l>h)return;if(l<rMin[rr])rMin[rr]=l;if(h>rMax[rr])rMax[rr]=h;
  };
  /* Plot 4 symmetric spans for a given (dx,dy) offset from centre */
  const plot=(dx,dy)=>{
    // lo and hi in x for the top/bottom row pair
    let xl,xr,rowT,rowB;
    if(isEX){xl=cx-dx;xr=cx+dx-1;}else{xl=Math.floor(cx)-dx;xr=Math.floor(cx)+dx;}
    if(isEY){rowT=cy-dy;rowB=cy+dy-1;}else{rowT=Math.floor(cy)-dy;rowB=Math.floor(cy)+dy;}
    addSpan(rowT,xl,xr);
    if(rowT!==rowB)addSpan(rowB,xl,xr);
  };

  /* Region 1: slope |dy/dx| < 1 */
  let x=0,y=b;
  let p=Math.round(b2-(a2*b)+(a2/4));
  while(2*b2*x<2*a2*y){
    plot(x,y);
    if(p<0){x++;p+=2*b2*x+b2;}else{x++;y--;p+=2*b2*x-2*a2*y+b2;}
  }
  /* Region 2: slope |dy/dx| >= 1 */
  p=Math.round(b2*(x+0.5)*(x+0.5)+a2*(y-1)*(y-1)-a2*b2);
  while(y>=0){
    plot(x,y);
    if(p>0){y--;p-=2*a2*y+a2;}else{y--;x++;p+=2*b2*x-2*a2*y+a2;}
  }

  for(let j=0;j<Gr;j++)for(let i=rMin[j];i<=rMax[j];i++)if(i>=0&&i<Gc)f[j][i]=1;
}

function fillThreshold(Gc,Gr,cx,cy,rx,ry,f){
  const rx2=rx*rx,ry2=ry*ry;
  for(let j=0;j<Gr;j++)for(let i=0;i<Gc;i++){
    const nx=Math.max(i,Math.min(i+1,cx)),ny=Math.max(j,Math.min(j+1,cy));
    if((nx-cx)**2/rx2+(ny-cy)**2/ry2<=1)f[j][i]=1;
  }
}
function computeFilled(Gc,Gr,cx,cy,rx,ry){
  const f=Array.from({length:Gr},()=>new Uint8Array(Gc));
  if(algo==='euclidean')fillEuclidean(Gc,Gr,cx,cy,rx,ry,f);
  else if(algo==='bresenham')fillBresenham(Gc,Gr,cx,cy,rx,ry,f);
  else fillThreshold(Gc,Gr,cx,cy,rx,ry,f);
  return f;
}
function applyRenderMode(f,Gc,Gr){
  if(renderMode==='filled')return f;
  const b=Array.from({length:Gr},()=>new Uint8Array(Gc));
  for(let j=0;j<Gr;j++)for(let i=0;i<Gc;i++){
    if(!f[j][i])continue;
    if(j===0||!f[j-1][i]||j===Gr-1||!f[j+1][i]||i===0||!f[j][i-1]||i===Gc-1||!f[j][i+1])b[j][i]=1;
  }
  if(renderMode==='thin')return b;
  const t=Array.from({length:Gr},()=>new Uint8Array(Gc));
  for(let j=0;j<Gr;j++)for(let i=0;i<Gc;i++){
    if(!f[j][i])continue;
    if(b[j][i]){t[j][i]=1;continue;}
    const hH=(i>0&&b[j][i-1])||(i<Gc-1&&b[j][i+1]),hV=(j>0&&b[j-1][i])||(j<Gr-1&&b[j+1][i]);
    if(hH&&hV)t[j][i]=1;
  }
  return t;
}

/* ══ DRAW HELPERS ══ */
function snap(v){return Math.floor(v)+.5;}
function drawExtendedGrid(tc,ps,ox,oy,cW,cH,lw){
  tc.save();tc.strokeStyle=C().gridLine;tc.lineWidth=lw||1;tc.beginPath();
  /* Start from grid-aligned position before the canvas edge */
  const sx=((ox%ps)+ps)%ps-ps;
  const sy=((oy%ps)+ps)%ps-ps;
  for(let x=sx;x<=cW+ps;x+=ps){const v=snap(x);tc.moveTo(v,0);tc.lineTo(v,cH);}
  for(let y=sy;y<=cH+ps;y+=ps){const v=snap(y);tc.moveTo(0,v);tc.lineTo(cW,v);}
  tc.stroke();tc.restore();
}
function drawPerfectEllipse(tc,cx,cy,rx,ry,ps,ox,oy){
  const scrCX=ox+cx*ps,scrCY=oy+cy*ps,srX=rx*ps,srY=ry*ps;
  if(srX<1||srY<1)return;
  const steps=Math.ceil(2*Math.PI*Math.max(srX,srY)*8);
  const seen=new Set();tc.fillStyle=C().circleArc;
  for(let s=0;s<steps;s++){
    const a=(s/steps)*Math.PI*2;
    const sx=Math.floor(scrCX+Math.cos(a)*srX),sy=Math.floor(scrCY+Math.sin(a)*srY);
    const k=sx*65536+sy;if(!seen.has(k)){seen.add(k);tc.fillRect(sx,sy,1,1);}
  }
}
function drawCenterLines(tc,cx,cy,ps,ox,oy,cW,cH){
  if(!showCenter||sliderActive)return;
  const isEX=(cx===Math.floor(cx)),isEY=(cy===Math.floor(cy));
  tc.save();tc.fillStyle=C().centerLine;
  const pw=Math.ceil(ps),ph=Math.ceil(ps);
  const addRow=(ry)=>{
    const c1=isEX?Math.floor(ox+(Math.floor(cx)-1)*ps):Math.floor(ox+Math.floor(cx)*ps);
    const c2=isEX?Math.floor(ox+Math.floor(cx)*ps):null;
    if(isEX){
      tc.fillRect(0,ry,c1,ph);tc.fillRect(c1+pw,ry,c2-c1-pw,ph);tc.fillRect(c2+pw,ry,cW-c2-pw,ph);
    }else{
      tc.fillRect(0,ry,c1,ph);tc.fillRect(c1+pw,ry,cW-c1-pw,ph);
    }
  };
  if(isEX){
    tc.fillRect(Math.floor(ox+(Math.floor(cx)-1)*ps),0,pw,cH);
    tc.fillRect(Math.floor(ox+Math.floor(cx)*ps),0,pw,cH);
  }else{
    tc.fillRect(Math.floor(ox+Math.floor(cx)*ps),0,pw,cH);
  }
  if(isEY){addRow(Math.floor(oy+(Math.floor(cy)-1)*ps));addRow(Math.floor(oy+Math.floor(cy)*ps));}
  else{addRow(Math.floor(oy+Math.floor(cy)*ps));}
  tc.restore();
}

function renderViewport(tc,geo,f,cW,cH,doGrid,doCircle,doCenter,lw){
  const{ps,Gc,Gr,ox,oy}=geo;
  tc.imageSmoothingEnabled=false;
  tc.fillStyle=C().bg;tc.fillRect(0,0,cW,cH);
  tc.fillStyle=C().gridBg;tc.fillRect(0,0,cW,cH);
  tc.fillStyle=C().pixel;
  for(let j=0;j<Gr;j++)for(let i=0;i<Gc;i++)
    if(f[j][i])tc.fillRect(Math.floor(ox+i*ps),Math.floor(oy+j*ps),Math.ceil(ps),Math.ceil(ps));
  if(doGrid)drawExtendedGrid(tc,ps,ox,oy,cW,cH,lw||1);
  const cx=Gc/2,cy=Gr/2;
  const rx=isEllipse?diamW/2:diamSize/2;
  const ry=isEllipse?diamH/2:diamSize/2;
  if(doCircle)drawPerfectEllipse(tc,cx,cy,rx,ry,ps,ox,oy);
  if(doCenter)drawCenterLines(tc,cx,cy,ps,ox,oy,cW,cH);
}

/* ── Main draw ── */
function draw(){
  applyLayout();
  const avail=getAvailableSpace();
  const geo=computeGeometry(avail.w,avail.h);
  if(!geo){ctx.fillStyle=C().bg;ctx.fillRect(0,0,mainCanvas.width||1,mainCanvas.height||1);return;}
  const{cW,cH,ps,Gc,Gr,ox,oy}=geo;

  mainCanvas.width=cW;mainCanvas.height=cH;
  /* Set CSS dimensions to match pixel dimensions — prevents layout overflow */
  mainCanvas.style.width=cW+'px';mainCanvas.style.height=cH+'px';

  if(isLS){
    /* Landscape: frame is CSS flex:1 — do NOT set inline width/height */
    cFrame.style.width='';cFrame.style.height='';
  }else{
    /* Portrait: frame wraps canvas exactly */
    cFrame.style.width=cW+'px';cFrame.style.height=cH+'px';
  }

  syncWidths(cW);fitTitle(cW);fitPillFonts();
  drawAllThumbs();syncOverlay(sliderActive);

  const cx=Gc/2,cy=Gr/2;
  const rx=isEllipse?diamW/2:diamSize/2;
  const ry=isEllipse?diamH/2:diamSize/2;
  const fRaw=computeFilled(Gc,Gr,cx,cy,rx,ry);
  const f=applyRenderMode(fRaw,Gc,Gr);
  /* item 3: count exactly what's painted, update before updateInfo */
  _paintedCount=0;for(let j=0;j<Gr;j++)for(let i=0;i<Gc;i++)if(f[j][i])_paintedCount++;
  updateInfo(cW);
  if(showZoom&&!isEllipse){
    const m=1.0,pad=getPad(diamSize);
    const srcSpan=Math.max((cx+m)-(pad-m),(cy+m)-(pad-m));
    const zps=Math.min(cW,cH)/srcSpan;
    const zGeo={ps:zps,Gc,Gr,ox:-(pad-m)*zps,oy:-(pad-m)*zps};
    renderViewport(ctx,zGeo,f,cW,cH,showGrid,showCircle,showCenter);
  }else{
    renderViewport(ctx,geo,f,cW,cH,showGrid,showCircle,showCenter);
  }
}

function downloadPNG(){
  const size=4000;
  if(isEllipse){
    const padX=getPad(diamW),padY=getPad(diamH);
    const Gc=diamW+padX*2,Gr=diamH+padY*2;
    const asp=Gc/Gr;
    const dlW=Math.round(asp>=1?size:size*asp),dlH=Math.round(asp>=1?size/asp:size);
    const off=document.createElement('canvas');off.width=dlW;off.height=dlH;
    const otx=off.getContext('2d');otx.imageSmoothingEnabled=false;
    const ps=Math.min(dlW/Gc,dlH/Gr);
    const geo={ps,Gc,Gr,ox:(dlW-Gc*ps)/2,oy:(dlH-Gr*ps)/2};
    const fRaw=computeFilled(Gc,Gr,Gc/2,Gr/2,diamW/2,diamH/2);
    const f=applyRenderMode(fRaw,Gc,Gr);
    renderViewport(otx,geo,f,dlW,dlH,showGrid,showCircle,showCenter,5);
    const a=document.createElement('a');a.download=`pixel-ellipse-${diamW}x${diamH}-${renderMode}-${algo}.png`;
    a.href=off.toDataURL('image/png');a.click();
  }else{
    const D=diamSize;if(!D)return;
    const p=getPad(D),G=D+p*2;
    const off=document.createElement('canvas');off.width=off.height=size;
    const otx=off.getContext('2d');otx.imageSmoothingEnabled=false;
    const geo={ps:size/G,Gc:G,Gr:G,ox:0,oy:0};
    const fRaw=computeFilled(G,G,G/2,G/2,D/2,D/2);
    const f=applyRenderMode(fRaw,G,G);
    renderViewport(otx,geo,f,size,size,showGrid,showCircle,showCenter,5);
    const a=document.createElement('a');a.download=`pixel-circle-d${D}-${renderMode}-${algo}.png`;
    a.href=off.toDataURL('image/png');a.click();
  }
}

/* ── Events ── */
function mkSl(sl,setter){
  sl.addEventListener('mousedown',()=>{sliderActive=true;draw();});
  sl.addEventListener('touchstart',()=>{sliderActive=true;draw();},{passive:true});
  sl.addEventListener('input',()=>{setter(parseInt(sl.value));draw();});
}
window.addEventListener('mouseup',()=>{if(sliderActive){sliderActive=false;draw();}});
window.addEventListener('touchend',()=>{if(sliderActive){sliderActive=false;draw();}});
mkSl(slSize,v=>{diamSize=v;setTrack(slSize,v,32);});
mkSl(slWidth,v=>{diamW=v;setTrack(slWidth,v,32);});
mkSl(slHeight,v=>{diamH=v;setTrack(slHeight,v,32);});
document.querySelectorAll('.rnd-opt').forEach(o=>{o.addEventListener('click',()=>{renderMode=o.dataset.mode;document.querySelectorAll('.rnd-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active');draw();});});
document.querySelectorAll('.algo-opt').forEach(o=>{o.addEventListener('click',()=>{algo=o.dataset.algo;document.querySelectorAll('.algo-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active');draw();});});
btnCircle.addEventListener('click',()=>{showCircle=!showCircle;btnCircle.classList.toggle('active',showCircle);draw();});
btnZoom.addEventListener('click',()=>{showZoom=!showZoom;btnZoom.classList.toggle('active',showZoom);draw();});
btnCenter.addEventListener('click',()=>{showCenter=!showCenter;btnCenter.classList.toggle('active',showCenter);draw();});
btnGrid.addEventListener('click',()=>{showGrid=!showGrid;btnGrid.classList.toggle('active',showGrid);draw();});
btnTheme.addEventListener('click',()=>{
  isDark = !isDark;

  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');

  btnTheme.classList.toggle('active', !isDark);

  updateFavicon(); // 🔥 aqui

  draw();
});
btnDownload.addEventListener('click',downloadPNG);

/* Debounce ResizeObserver to avoid loop notifications */
let _roDraw=null;
const roDraw=()=>{if(_roDraw)cancelAnimationFrame(_roDraw);_roDraw=requestAnimationFrame(draw);};
new ResizeObserver(roDraw).observe(cWrap);
[document.getElementById('sw-size'),document.getElementById('sw-width'),document.getElementById('sw-height')]
  .forEach(el=>{if(el)new ResizeObserver(()=>{if(_roDraw)cancelAnimationFrame(_roDraw);_roDraw=requestAnimationFrame(drawAllThumbs);}).observe(el);});
window.addEventListener('resize',roDraw);
setTrack(slSize,diamSize,32);setTrack(slWidth,diamW,32);setTrack(slHeight,diamH,32);
syncModeWords();
updatePageTitle();
requestAnimationFrame(()=>requestAnimationFrame(draw));
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
