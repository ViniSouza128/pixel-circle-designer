<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Circle Designer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg:#0b0b0f; --surface:rgba(255,255,255,0.04);
    --border:rgba(224,48,48,0.32); --border-hi:rgba(224,48,48,0.72);
    --red:#e03030; --red-lt:#ff8080; --red-dim:rgba(224,48,48,0.16);
    --gl:#1e1e2c; --muted:#4a4666; --text:#d4d0ef; --text-hi:#ffffff;
    --radius:12px; --thumb:80px; --btn:44px; --gap:8px;
    /* canvas button states — dark mode */
    --cbtn-active-bg: rgba(224,48,48,0.28);
    --cbtn-active-border: rgba(224,48,48,0.72);
  }
  html[data-theme="light"] {
    --bg:#f2ede2; --surface:rgba(0,0,0,0.04);
    --border:rgba(170,30,30,0.30); --border-hi:rgba(170,30,30,0.68);
    --red:#cc2020; --red-lt:#dd4444; --red-dim:rgba(200,32,32,0.12);
    --gl:#bfb8a8; --muted:#8a7060; --text:#2a1f1a; --text-hi:#0a0506;
    /* light mode canvas button active = same family as outer pill buttons */
    --cbtn-active-bg: rgba(200,32,32,0.14);
    --cbtn-active-border: rgba(170,30,30,0.68);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;transition:background .25s,color .25s;}

  /* ═══════════════════════════════════════
     PORTRAIT  (default — body.pt class set by JS)
  ═══════════════════════════════════════ */
  body{display:flex;flex-direction:column;align-items:center;padding:0 2dvw 2dvh;}

  #header-area{flex-shrink:0;height:11dvh;width:100%;display:flex;align-items:center;justify-content:center;}
  #h1p{font-family:'Press Start 2P',monospace;font-size:3.5dvh;color:var(--text-hi);white-space:nowrap;line-height:1.2;}
  #h1-ls{display:none;}

  #canvas-wrap{flex:1 1 0;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #canvas-frame{position:relative;border:1px solid var(--gl);border-radius:var(--radius);overflow:hidden;flex-shrink:1;display:inline-flex;}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

  #gap-render{height:var(--gap);flex-shrink:0;}
  #gap1{height:var(--gap);flex-shrink:0;}
  #gap2{height:var(--gap);flex-shrink:0;}

  #render-row,#algo-row{flex-shrink:0;display:flex;justify-content:center;gap:var(--gap);align-items:stretch;height:56px;}
  .rnd-opt,.algo-opt{flex:1 1 0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);transition:border-color .15s,background .15s;user-select:none;min-width:0;overflow:hidden;}
  .rnd-opt:hover,.algo-opt:hover{border-color:var(--border-hi);background:rgba(224,48,48,.08);}
  .rnd-opt.active,.algo-opt.active{border-color:var(--border-hi);background:var(--red-dim);}
  .rnd-icon{font-size:clamp(.7rem,1.6vw,1rem);line-height:1;color:var(--muted);transition:color .15s;flex-shrink:0;}
  .rnd-opt.active .rnd-icon{color:var(--red-lt);}
  .rnd-name,.algo-name{font-size:clamp(0.5rem,1.3vw,.82rem);font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);white-space:nowrap;transition:color .15s;}
  .rnd-opt.active .rnd-name,.algo-opt.active .algo-name{color:var(--red-lt);}
  .algo-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;transition:background .15s,border-color .15s;}
  .algo-opt.active .algo-dot{background:var(--red);border-color:var(--red-lt);}

  #diam-box{flex-shrink:0;display:flex;flex-direction:column;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0 16px 6px;height:calc(var(--thumb) + 40px);}
  #diam-slider-wrap{width:100%;position:relative;padding:calc(var(--thumb)/2) 0;}
  input#diamSl{-webkit-appearance:none;appearance:none;width:100%;height:16px;border-radius:8px;outline:none;cursor:pointer;display:block;background:linear-gradient(to right,var(--red) 0%,var(--red) var(--pct,0%),var(--gl) var(--pct,0%),var(--gl) 100%);}
  input#diamSl::-webkit-slider-thumb{-webkit-appearance:none;width:var(--thumb);height:var(--thumb);border-radius:50%;background:var(--red);border:2.5px solid var(--red-lt);box-shadow:none;cursor:pointer;}
  input#diamSl::-moz-range-thumb{width:var(--thumb);height:var(--thumb);border-radius:50%;background:var(--red);border:2.5px solid var(--red-lt);box-shadow:none;cursor:pointer;}
  #thumb-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
  #diam-label{font-size:clamp(0.5rem,1.3vw,.82rem);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

  /* Overlay — solid stroke, no shadow */
  #diam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .12s;gap:2px;}
  #diam-overlay.visible{opacity:1;}
  #ov-diam{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(3rem,10vw,7rem);color:#ffffff;-webkit-text-stroke:3px rgba(0,0,0,0.55);text-stroke:3px rgba(0,0,0,0.55);paint-order:stroke fill;letter-spacing:-0.01em;line-height:1;display:flex;align-items:baseline;}
  html[data-theme="light"] #ov-diam{color:#1a0a0a;-webkit-text-stroke:3px rgba(255,255,255,0.55);text-stroke:3px rgba(255,255,255,0.55);}
  #ov-diam .sym{font-family:sans-serif;font-size:1.25em;font-weight:700;}
  #ov-rad{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:clamp(.9rem,2.5vw,2rem);color:rgba(255,255,255,0.85);-webkit-text-stroke:2px rgba(0,0,0,0.45);text-stroke:2px rgba(0,0,0,0.45);paint-order:stroke fill;letter-spacing:.02em;line-height:1;}
  html[data-theme="light"] #ov-rad{color:rgba(20,5,5,0.85);-webkit-text-stroke:2px rgba(255,255,255,0.45);}

  /* Surface */
  .surface{background:rgba(11,11,15,.88);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .15s,background .15s;}
  html[data-theme="light"] .surface{background:rgba(242,237,226,.92);}

  /* ── Canvas buttons — use CSS vars for active state ──
     Item 1: light mode active state now visible/intuitive
  ── */
  #canvas-btns-tl{position:absolute;top:8px;left:8px;display:flex;gap:6px;}
  #canvas-btns-tr{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
  #canvas-btns-br{position:absolute;bottom:8px;right:8px;display:flex;flex-direction:column;gap:6px;}
  #canvas-info{position:absolute;bottom:8px;left:8px;}

  .c-btn{
    width:var(--btn);height:var(--btn);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    user-select:none;flex-shrink:0;
    color:var(--red-lt);
    /* inactive = dim */
    background:transparent;
  }
  .c-btn:hover{border-color:var(--border-hi);background:var(--cbtn-active-bg);color:var(--text-hi);}
  .c-btn.active{
    background:var(--cbtn-active-bg);
    border-color:var(--cbtn-active-border);
    color:var(--red-lt);
  }
  /* Make inactive canvas buttons more visible in light mode */
  html[data-theme="light"] .c-btn{color:var(--red);}
  html[data-theme="light"] .c-btn.active{color:var(--red);border-color:var(--cbtn-active-border);}

  #info-btn{
    width:var(--btn);height:var(--btn);
    font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    user-select:none;color:var(--red-lt);
  }
  #info-btn:hover{border-color:var(--border-hi);color:var(--text-hi);}
  #info-btn.active{background:var(--cbtn-active-bg);border-color:var(--cbtn-active-border);color:var(--red-lt);}
  html[data-theme="light"] #info-btn{color:var(--red);}

  #info-chip{
    display:none;padding:8px 12px;
    font-weight:700;color:var(--red-lt);
    letter-spacing:.04em;line-height:1.65;
    white-space:nowrap;cursor:pointer;
    max-height:calc(var(--btn)*3 + 6px*2);
    overflow:hidden;
  }
  #info-chip:hover{border-color:var(--border-hi);}
  html[data-theme="light"] #info-chip{color:var(--red);}

  /* ═══════════════════════════════════════
     LANDSCAPE — .ls class on body (set by JS math)
  ═══════════════════════════════════════ */
  body.ls {
    display:grid;
    grid-template-columns:clamp(56px,8dvw,88px) 1fr clamp(56px,8dvw,88px);
    grid-template-rows:auto 1fr auto;
    grid-template-areas:". title ." "left canvas right" ". slider .";
    padding:1.5dvh 2dvw; gap:8px;
    align-items:stretch; flex-direction:unset; overflow:hidden;
  }
  body.ls #header-area{display:none!important;}
  body.ls #gap-render{display:none!important;}
  body.ls #gap1{display:none!important;}
  body.ls #gap2{display:none!important;}
  body.ls #h1-ls{
    display:block;grid-area:title;
    align-self:center;justify-self:center;
    font-family:'Press Start 2P',monospace;
    font-size:3dvh;color:var(--text-hi);white-space:nowrap;line-height:1.2;
  }
  body.ls #canvas-wrap{
    grid-area:canvas;overflow:hidden;
    min-width:0;min-height:0;
    display:flex;align-items:stretch;justify-content:stretch;
    flex:unset;width:unset;
  }
  body.ls #canvas-frame{
    flex:1 1 0;min-width:0;min-height:0;
    display:flex;align-items:center;justify-content:center;
  }
  body.ls #render-row{
    grid-area:left;flex-direction:column;gap:8px;
    align-items:stretch;justify-content:stretch;height:unset;
  }
  body.ls .rnd-opt{flex:1 1 0;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px 5px;min-height:0;}
  body.ls .rnd-icon{font-size:clamp(.9rem,2dvh,1.4rem);}
  body.ls .rnd-name{font-size:clamp(0.5rem,1.4dvh,.95rem);white-space:nowrap;}
  body.ls #algo-row{
    grid-area:right;flex-direction:column;gap:8px;
    align-items:stretch;justify-content:stretch;height:unset;
  }
  body.ls .algo-opt{flex:1 1 0;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px 5px;min-height:0;}
  body.ls .algo-dot{width:13px;height:13px;}
  body.ls .algo-name{font-size:clamp(0.5rem,1.4dvh,.95rem);white-space:nowrap;}
  body.ls #diam-box{grid-area:slider;width:100%;padding:0 12px 6px;height:unset;--thumb:60px;}
  body.ls #diam-slider-wrap{padding:calc(var(--thumb)/2) 0;}
  body.ls input#diamSl{height:12px;border-radius:6px;}
  body.ls input#diamSl::-webkit-slider-thumb{width:var(--thumb);height:var(--thumb);}
  body.ls input#diamSl::-moz-range-thumb{width:var(--thumb);height:var(--thumb);}
  body.ls #diam-label{font-size:clamp(0.5rem,1.4dvh,.95rem);margin-top:2px;}
</style>
</head>
<body>

<div id="header-area"><h1 id="h1p">Pixel Circle Designer</h1></div>

<div id="canvas-wrap">
  <div id="canvas-frame">
    <canvas id="c"></canvas>
    <div id="diam-overlay">
      <span id="ov-diam"><span class="sym"></span><span id="ov-num"></span></span>
      <span id="ov-rad"></span>
    </div>

    <!-- item 2: theme first, then grid -->
    <div id="canvas-btns-tl">
      <button class="c-btn surface" id="btnTheme" title="Toggle light/dark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="7.1" y2="7.1"/><line x1="16.9" y1="16.9" x2="19.1" y2="19.1"/><line x1="19.1" y1="4.9" x2="16.9" y2="7.1"/><line x1="4.9" y1="19.1" x2="7.1" y2="16.9"/></svg>
      </button>
      <button class="c-btn surface active" id="btnGrid" title="Toggle grid">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="9" y1="2" x2="9" y2="22"/><line x1="15" y1="2" x2="15" y2="22"/><line x1="2" y1="9" x2="22" y2="9"/><line x1="2" y1="15" x2="22" y2="15"/></svg>
      </button>
    </div>

    <div id="canvas-btns-tr">
      <button class="c-btn surface" id="btnDownload" title="Download PNG">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="3" x2="12" y2="15"/><polyline points="7,10 12,15 17,10"/><line x1="4" y1="20" x2="20" y2="20"/></svg>
      </button>
    </div>

    <div id="canvas-btns-br">
      <button class="c-btn surface" id="btnCenter" title="Toggle center guides">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="c-btn surface" id="btnCircle" title="Perfect circle overlay">
        <svg width="20" height="20" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="13" cy="13" r="9"/></svg>
      </button>
      <button class="c-btn surface" id="btnZoom" title="Zoom top-left">
        <svg width="20" height="20" viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7.5"/><line x1="17" y1="17" x2="23.5" y2="23.5"/><line x1="8.5" y1="11" x2="13.5" y2="11"/><line x1="11" y1="8.5" x2="11" y2="13.5"/></svg>
      </button>
    </div>

    <div id="canvas-info">
      <button id="info-btn" class="surface" title="Info">i</button>
      <div id="info-chip" class="surface"></div>
    </div>
  </div>
</div>

<div id="gap-render"></div>
<div id="render-row">
  <label class="rnd-opt active" data-mode="filled"><span class="rnd-icon">●</span><span class="rnd-name">Filled</span><input type="radio" name="rmode" value="filled" checked hidden></label>
  <label class="rnd-opt" data-mode="thin"><span class="rnd-icon">○</span><span class="rnd-name">Thin</span><input type="radio" name="rmode" value="thin" hidden></label>
  <label class="rnd-opt" data-mode="thick"><span class="rnd-icon">◎</span><span class="rnd-name">Thick</span><input type="radio" name="rmode" value="thick" hidden></label>
</div>
<div id="gap1"></div>
<div id="algo-row">
  <label class="algo-opt active" data-algo="euclidean"><span class="algo-dot"></span><span class="algo-name">Euclidean</span><input type="radio" name="algo" value="euclidean" checked hidden></label>
  <label class="algo-opt" data-algo="bresenham"><span class="algo-dot"></span><span class="algo-name">Bresenham</span><input type="radio" name="algo" value="bresenham" hidden></label>
  <label class="algo-opt" data-algo="threshold"><span class="algo-dot"></span><span class="algo-name">Threshold</span><input type="radio" name="algo" value="threshold" hidden></label>
</div>
<div id="gap2"></div>
<div id="diam-box">
  <div id="diam-slider-wrap">
    <input type="range" id="diamSl" min="0" max="32" step="1" value="16">
    <canvas id="thumb-canvas"></canvas>
  </div>
  <span id="diam-label">Size</span>
</div>
<h1 id="h1-ls">Pixel Circle Designer</h1>

<script>
const mainCanvas  = document.getElementById('c');
const ctx         = mainCanvas.getContext('2d');
const cFrame      = document.getElementById('canvas-frame');
const cWrap       = document.getElementById('canvas-wrap');
const renderRow   = document.getElementById('render-row');
const algoRow     = document.getElementById('algo-row');
const diamBox     = document.getElementById('diam-box');
const diamSl      = document.getElementById('diamSl');
const thumbCv     = document.getElementById('thumb-canvas');
const thumbCtx    = thumbCv.getContext('2d');
const infoBtnEl   = document.getElementById('info-btn');
const infoChip    = document.getElementById('info-chip');
const diamOverlay = document.getElementById('diam-overlay');
const ovNum       = document.getElementById('ov-num');
const ovSym       = diamOverlay.querySelector('.sym');
const ovRad       = document.getElementById('ov-rad');
const h1p         = document.getElementById('h1p');
const h1Ls        = document.getElementById('h1-ls');
const btnCircle   = document.getElementById('btnCircle');
const btnZoom     = document.getElementById('btnZoom');
const btnTheme    = document.getElementById('btnTheme');
const btnDownload = document.getElementById('btnDownload');
const btnCenter   = document.getElementById('btnCenter');
const btnGrid     = document.getElementById('btnGrid');
const bodyEl      = document.body;

const ALGO_FULL = {euclidean:'Euclidean Distance',bresenham:'Midpoint Circle (Bresenham)',threshold:'Threshold Coverage'};
const THM = {
  dark: {bg:'#0b0b0f',gridBg:'#13131c',gridLine:'#1e1e2c',pixel:'#e03030',circleArc:'#ff9bbc',centerLine:'rgba(200,140,140,0.16)'},
  light:{bg:'#f2ede2',gridBg:'#ece8de',gridLine:'#bfb8a8',pixel:'#c82020',circleArc:'#7a1040',centerLine:'rgba(100,30,30,0.22)'},
};
let isDark=true;
const C=()=>isDark?THM.dark:THM.light;

let diameter=16,radius=8,algo='euclidean',renderMode='filled';
let showCircle=false,showZoom=false,showCenter=false,showGrid=true;
let sliderActive=false,infoExpanded=false;
let isLS=false;

const areaTable=Array.from({length:33},(_,D)=>{
  if(!D) return 0;const r=D/2,cx=D/2,cy=D/2;let a=0;
  for(let j=0;j<D;j++) for(let i=0;i<D;i++) if(Math.sqrt((i+.5-cx)**2+(j+.5-cy)**2)<=r) a++;
  return a;
});

function setTrack(v){diamSl.style.setProperty('--pct',(v/32*100)+'%');}

/* ── item 3: mathematical breakpoint ─────────────
   Compute the circle-display size (min-dim of canvas) for
   both portrait and landscape at current window dimensions.
   Use whichever layout gives the larger display.
──────────────────────────────────────────────────── */
function computeLayoutChoice(){
  const W = window.innerWidth;
  const H = window.innerHeight;

  // ── Portrait canvas estimate ──
  // Fixed vertical space: header + bottom pad + rows + gaps + slider
  const hdrH   = H * 0.11;             // 11dvh
  const padB   = H * 0.02;             // 2dvh
  const rowsH  = 56 + 56;              // render-row + algo-row
  const gapsH  = 8 * 5;                // 5 gaps (gap-render + gap1 + gap2 + 2 inside body)
  const sliderH = 80 + 40;             // thumb + extra
  const ptFixedH = hdrH + padB + rowsH + gapsH + sliderH;
  const ptCanvasH = H - ptFixedH;
  const ptCanvasW = W * 0.96;          // body padding 2dvw each side
  const ptSide = Math.min(ptCanvasW, ptCanvasH);

  // ── Landscape canvas estimate ──
  const sideCols = Math.min(88, Math.max(56, W * 0.08)) * 2;
  const lsHPad   = H * 0.03 + H * 0.015;    // padding top + bottom (1.5dvh + 1.5dvh)
  const lsTitleH = H * 0.04;                  // landscape title row
  const lsSliderH = 60 + 40;                  // thumb + extra (--thumb:60px in ls)
  const lsGap    = 8 * 3;                     // 3 gaps in grid rows
  const lsCanvasW = W - sideCols - W * 0.04;  // subtract cols + side padding
  const lsCanvasH = H - lsHPad - lsTitleH - lsSliderH - lsGap;
  const lsMinDim  = Math.min(lsCanvasW, lsCanvasH);

  // Landscape is preferred when it gives a strictly larger circle display
  return lsMinDim > ptSide;
}

function getThumbPx(){ return parseInt(getComputedStyle(diamBox).getPropertyValue('--thumb'))||80; }

function applyLayout(){
  const newLS = computeLayoutChoice();
  if(newLS !== isLS){
    isLS = newLS;
    bodyEl.classList.toggle('ls', isLS);
  }
}

function getCanvasSize(){
  if(isLS){
    cFrame.style.width=''; cFrame.style.height='';
    const r=cWrap.getBoundingClientRect();
    return{w:Math.max(Math.floor(r.width),60),h:Math.max(Math.floor(r.height),40)};
  } else {
    cFrame.style.width='0px'; cFrame.style.height='0px';
    const r=cWrap.getBoundingClientRect();
    const s=Math.max(Math.min(r.width,r.height)-2,60);
    return{w:s,h:s};
  }
}

function syncWidths(cW){
  if(!isLS){
    const ws=cW+'px';
    renderRow.style.width=ws;algoRow.style.width=ws;diamBox.style.width=ws;
  } else {
    renderRow.style.width='';algoRow.style.width='';diamBox.style.width='';
  }
}

function fitTitle(cW){
  const el=isLS?h1Ls:h1p;
  const maxH=Math.floor(window.innerHeight*0.035);
  const targetW=cW||diamBox.getBoundingClientRect().width||200;
  if(!targetW) return;
  el.style.fontSize=maxH+'px';
  if(el.scrollWidth<=targetW) return;
  let lo=4,hi=maxH;
  for(let i=0;i<20;i++){const m=(lo+hi)/2;el.style.fontSize=m+'px';el.scrollWidth<=targetW?(lo=m):(hi=m);}
  el.style.fontSize=lo+'px';
}

function updateInfo(){
  const btnPx=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--btn'))||44;
  const gap=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))||8;
  const frameR=cFrame.getBoundingClientRect();
  const chipW=Math.max(frameR.width - btnPx - gap*3 - btnPx, 80);
  infoChip.style.width=chipW+'px';
  const maxH=btnPx*3+gap*2;
  infoChip.style.maxHeight=maxH+'px';
  const lines=[`Diameter: ${diameter}`,`Radius: ${radius}`,`Area: ${areaTable[diameter]??0}`,`Algorithm: ${ALGO_FULL[algo]}`];
  const testEl=document.createElement('span');
  testEl.style.cssText='position:absolute;visibility:hidden;white-space:nowrap;font-family:"JetBrains Mono",monospace;font-weight:700;letter-spacing:0.04em;';
  document.body.appendChild(testEl);
  const chipInnerW=chipW-24;
  let bestFs=8;
  for(let fs=18;fs>=7;fs-=0.5){
    const totalH=fs*1.65*4+16;
    if(totalH>maxH) continue;
    testEl.style.fontSize=fs+'px';testEl.textContent=lines[3];
    if(testEl.scrollWidth<=chipInnerW){bestFs=fs;break;}
  }
  document.body.removeChild(testEl);
  infoChip.style.fontSize=bestFs+'px';
  infoChip.innerHTML=lines.join('<br>');
}

function toggleInfo(){infoExpanded=!infoExpanded;infoBtnEl.style.display=infoExpanded?'none':'flex';infoChip.style.display=infoExpanded?'block':'none';}
infoBtnEl.addEventListener('click',toggleInfo);infoChip.addEventListener('click',toggleInfo);

function syncOverlay(v){ovSym.textContent=v?'⌀':'';ovNum.textContent=v?String(diameter):'';ovRad.textContent=v?`r${radius}`:'';diamOverlay.classList.toggle('visible',v);}

/* ══ ALGORITHMS ══════════════════════════════ */
function fillEuclidean(G,cx,cy,R,f){const R2=R*R;for(let j=0;j<G;j++){const dy=j+.5-cy,dy2=dy*dy;if(dy2>R2)continue;const dx=Math.sqrt(R2-dy2);for(let i=Math.max(0,Math.ceil(cx-dx-.5));i<=Math.min(G-1,Math.floor(cx+dx-.5));i++)f[j][i]=1;}}
function fillBresenham(G,cx,cy,R,f){const iR=Math.floor(R),isEven=(cx===Math.floor(cx));if(iR===0){if(!isEven){const pi=Math.floor(cx),pj=Math.floor(cy);if(pi>=0&&pi<G&&pj>=0&&pj<G)f[pj][pi]=1;}return;}const rMin=new Int32Array(G).fill(G),rMax=new Int32Array(G).fill(-1);function span(row,lo,hi){if(row<0||row>=G||lo>hi)return;const l=Math.max(0,lo),r=Math.min(G-1,hi);if(l>r)return;if(l<rMin[row])rMin[row]=l;if(r>rMax[row])rMax[row]=r;}let x=0,y=iR,d=1-iR;while(x<=y){if(isEven){span(cy-y,cx-x,cx+x-1);span(cy+y-1,cx-x,cx+x-1);span(cy-x-1,cx-y,cx+y-1);span(cy+x,cx-y,cx+y-1);}else{const gcx=Math.floor(cx),gcy=Math.floor(cy);span(gcy+y,gcx-x,gcx+x);span(gcy-y,gcx-x,gcx+x);span(gcy+x,gcx-y,gcx+y);span(gcy-x,gcx-y,gcx+y);}if(d<0)d+=2*x+3;else{d+=2*(x-y)+5;y--;}x++;}for(let j=0;j<G;j++)for(let i=rMin[j];i<=rMax[j];i++)if(i>=0&&i<G)f[j][i]=1;}
function fillThreshold(G,cx,cy,R,f){const R2=R*R;const lo=Math.max(0,Math.floor(cx-R-1)),hi=Math.min(G-1,Math.ceil(cx+R+1));const lt=Math.max(0,Math.floor(cy-R-1)),ht=Math.min(G-1,Math.ceil(cy+R+1));for(let j=lt;j<=ht;j++)for(let i=lo;i<=hi;i++){const nx=Math.max(i,Math.min(i+1,cx)),ny=Math.max(j,Math.min(j+1,cy));if((nx-cx)**2+(ny-cy)**2<=R2)f[j][i]=1;}}
function computeFilled(G,cx,cy,R){const f=Array.from({length:G},()=>new Uint8Array(G));if(algo==='euclidean')fillEuclidean(G,cx,cy,R,f);else if(algo==='bresenham')fillBresenham(G,cx,cy,R,f);else fillThreshold(G,cx,cy,R,f);return f;}
function applyRenderMode(f,G){if(renderMode==='filled')return f;const b=Array.from({length:G},()=>new Uint8Array(G));for(let j=0;j<G;j++)for(let i=0;i<G;i++){if(!f[j][i])continue;if(j===0||!f[j-1][i]||j===G-1||!f[j+1][i]||i===0||!f[j][i-1]||i===G-1||!f[j][i+1])b[j][i]=1;}if(renderMode==='thin')return b;const t=Array.from({length:G},()=>new Uint8Array(G));for(let j=0;j<G;j++)for(let i=0;i<G;i++){if(!f[j][i])continue;if(b[j][i]){t[j][i]=1;continue;}const hH=(i>0&&b[j][i-1])||(i<G-1&&b[j][i+1]),hV=(j>0&&b[j-1][i])||(j<G-1&&b[j+1][i]);if(hH&&hV)t[j][i]=1;}return t;}

/* ══ DRAW ════════════════════════════ */
function snap(v){return Math.floor(v)+0.5;}
function drawExtendedGrid(tc,ps,ox,oy,cW,cH,lw){tc.save();tc.strokeStyle=C().gridLine;tc.lineWidth=lw||1;tc.beginPath();const sx=ox-Math.ceil(ox/ps)*ps,sy=oy-Math.ceil(oy/ps)*ps;for(let x=sx;x<=cW+ps;x+=ps){const v=snap(x);tc.moveTo(v,0);tc.lineTo(v,cH);}for(let y=sy;y<=cH+ps;y+=ps){const v=snap(y);tc.moveTo(0,v);tc.lineTo(cW,v);}tc.stroke();tc.restore();}
function drawPerfectCircle(tc,cx,cy,R,ps,ox,oy){const scrCX=ox+cx*ps,scrCY=oy+cy*ps,scrR=R*ps;if(scrR<1)return;const steps=Math.ceil(2*Math.PI*scrR*8);const seen=new Set();tc.fillStyle=C().circleArc;for(let s=0;s<steps;s++){const a=(s/steps)*Math.PI*2;const sx=Math.floor(scrCX+Math.cos(a)*scrR),sy=Math.floor(scrCY+Math.sin(a)*scrR);const k=sx*65536+sy;if(!seen.has(k)){seen.add(k);tc.fillRect(sx,sy,1,1);}}}
function drawCenterLines(tc,cx,cy,ps,ox,oy,cW,cH){if(!showCenter||sliderActive)return;const isEven=(cx===Math.floor(cx));tc.save();tc.fillStyle=C().centerLine;if(isEven){const c1x=Math.floor(ox+(Math.floor(cx)-1)*ps),c2x=Math.floor(ox+Math.floor(cx)*ps),pw=Math.ceil(ps);const r1y=Math.floor(oy+(Math.floor(cy)-1)*ps),r2y=Math.floor(oy+Math.floor(cy)*ps),ph=Math.ceil(ps);tc.fillRect(c1x,0,pw,cH);tc.fillRect(c2x,0,pw,cH);const c1E=c1x+pw,c2E=c2x+pw;for(const ry of[r1y,r2y]){tc.fillRect(0,ry,c1x,ph);tc.fillRect(c1E,ry,c2x-c1E,ph);tc.fillRect(c2E,ry,cW-c2E,ph);}}else{const cpx=Math.floor(ox+Math.floor(cx)*ps),cpy=Math.floor(oy+Math.floor(cy)*ps),pw=Math.ceil(ps),ph=Math.ceil(ps);tc.fillRect(cpx,0,pw,cH);tc.fillRect(0,cpy,cpx,ph);tc.fillRect(cpx+pw,cpy,cW-(cpx+pw),ph);}tc.restore();}
function renderViewport(tc,ox,oy,ps,G,cx,cy,R,f,cW,cH,doGrid,doCircle,doCenter){tc.imageSmoothingEnabled=false;tc.fillStyle=C().bg;tc.fillRect(0,0,cW,cH);tc.fillStyle=C().gridBg;tc.fillRect(0,0,cW,cH);tc.fillStyle=C().pixel;for(let j=0;j<G;j++)for(let i=0;i<G;i++)if(f[j][i])tc.fillRect(Math.floor(ox+i*ps),Math.floor(oy+j*ps),Math.ceil(ps),Math.ceil(ps));if(doGrid)drawExtendedGrid(tc,ps,ox,oy,cW,cH,1);if(doCircle)drawPerfectCircle(tc,cx,cy,R,ps,ox,oy);if(doCenter)drawCenterLines(tc,cx,cy,ps,ox,oy,cW,cH);}
function getPad(D,ls){return ls?Math.max(2,Math.ceil(D*.10)):Math.max(3,Math.ceil(D*.15));}

function drawThumb(){const wrap=document.getElementById('diam-slider-wrap');const r=wrap.getBoundingClientRect();if(!r.width)return;const T=getThumbPx(),dpr=window.devicePixelRatio||1;thumbCv.width=Math.round(r.width*dpr);thumbCv.height=Math.round(r.height*dpr);thumbCv.style.width=r.width+'px';thumbCv.style.height=r.height+'px';thumbCtx.setTransform(dpr,0,0,dpr,0,0);thumbCtx.clearRect(0,0,r.width,r.height);const trackW=r.width-T,cx_t=T/2+(diameter/32)*trackW,cy_t=r.height/2;const fsSym=Math.round(T*0.47),fsNum=Math.round(T*0.42),fsRad=Math.round(T*0.19);const numStr=String(diameter);thumbCtx.textBaseline='alphabetic';thumbCtx.font=`700 ${fsSym}px sans-serif`;const symW=thumbCtx.measureText('⌀').width;thumbCtx.font=`700 ${fsNum}px "JetBrains Mono",monospace`;const numW=thumbCtx.measureText(numStr).width;const sx=cx_t-(symW+1+numW)/2,y1=cy_t-(fsSym*0.72+4+fsRad*0.72)/2+fsSym*0.72;thumbCtx.fillStyle='#ffffff';thumbCtx.font=`700 ${fsSym}px sans-serif`;thumbCtx.fillText('⌀',sx,y1);thumbCtx.font=`700 ${fsNum}px "JetBrains Mono",monospace`;thumbCtx.fillText(numStr,sx+symW+1,y1);thumbCtx.font=`700 ${fsRad}px "JetBrains Mono",monospace`;thumbCtx.fillStyle='rgba(255,255,255,0.65)';thumbCtx.textAlign='center';thumbCtx.textBaseline='middle';thumbCtx.fillText(`r${radius}`,cx_t,y1+4+fsRad*0.5);}

function draw(){
  applyLayout(); /* item 3: decide layout before sizing */
  const{w:cW,h:cH}=getCanvasSize();
  mainCanvas.width=cW;mainCanvas.height=cH;
  ctx.imageSmoothingEnabled=false;
  if(!isLS){cFrame.style.width=cW+'px';cFrame.style.height=cH+'px';}
  syncWidths(cW);fitTitle(cW);
  updateInfo();drawThumb();syncOverlay(sliderActive);
  const D=diameter,R=radius;
  if(!D){ctx.fillStyle=C().bg;ctx.fillRect(0,0,cW,cH);return;}
  const pad=getPad(D,isLS);const G=D+pad*2,cx=G/2,cy=G/2;
  const fRaw=computeFilled(G,cx,cy,R);const f=applyRenderMode(fRaw,G);
  const ps=Math.min(cW,cH)/G;const ox=(cW-G*ps)/2,oy=(cH-G*ps)/2;
  if(showZoom){const m=1.0;const srcSpan=Math.max((cx+m)-(pad-m),(cy+m)-(pad-m));const zps=Math.min(cW,cH)/srcSpan;renderViewport(ctx,-(pad-m)*zps,-(pad-m)*zps,zps,G,cx,cy,R,f,cW,cH,showGrid,showCircle,showCenter);}
  else{renderViewport(ctx,ox,oy,ps,G,cx,cy,R,f,cW,cH,showGrid,showCircle,showCenter);}
}

function downloadPNG(){const size=4000;const off=document.createElement('canvas');off.width=off.height=size;const otx=off.getContext('2d');otx.imageSmoothingEnabled=false;const D=diameter;if(!D)return;const pad=getPad(D,false);const G=D+pad*2,cx=G/2,cy=G/2;const fRaw=computeFilled(G,cx,cy,radius);const f=applyRenderMode(fRaw,G);const ps=size/G;otx.fillStyle=C().bg;otx.fillRect(0,0,size,size);otx.fillStyle=C().gridBg;otx.fillRect(0,0,size,size);otx.fillStyle=C().pixel;for(let j=0;j<G;j++)for(let i=0;i<G;i++)if(f[j][i])otx.fillRect(Math.floor(i*ps),Math.floor(j*ps),Math.ceil(ps),Math.ceil(ps));if(showGrid)drawExtendedGrid(otx,ps,0,0,size,size,5);if(showCircle)drawPerfectCircle(otx,cx,cy,radius,ps,0,0);if(showCenter)drawCenterLines(otx,cx,cy,ps,0,0,size,size);const a=document.createElement('a');a.download=`pixel-circle-d${D}-${renderMode}-${algo}.png`;a.href=off.toDataURL('image/png');a.click();}

function onSliderChange(){diameter=parseInt(diamSl.value);radius=diameter/2;setTrack(diameter);draw();}
diamSl.addEventListener('mousedown',()=>{sliderActive=true;draw();});
diamSl.addEventListener('touchstart',()=>{sliderActive=true;draw();},{passive:true});
window.addEventListener('mouseup',()=>{if(sliderActive){sliderActive=false;draw();}});
window.addEventListener('touchend',()=>{if(sliderActive){sliderActive=false;draw();}});
diamSl.addEventListener('input',onSliderChange);
document.querySelectorAll('.rnd-opt').forEach(o=>{o.addEventListener('click',()=>{renderMode=o.dataset.mode;document.querySelectorAll('.rnd-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active');draw();});});
document.querySelectorAll('.algo-opt').forEach(o=>{o.addEventListener('click',()=>{algo=o.dataset.algo;document.querySelectorAll('.algo-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active');draw();});});
btnCircle.addEventListener('click',()=>{showCircle=!showCircle;btnCircle.classList.toggle('active',showCircle);draw();});
btnZoom.addEventListener('click',()=>{showZoom=!showZoom;btnZoom.classList.toggle('active',showZoom);draw();});
btnCenter.addEventListener('click',()=>{showCenter=!showCenter;btnCenter.classList.toggle('active',showCenter);draw();});
btnGrid.addEventListener('click',()=>{showGrid=!showGrid;btnGrid.classList.toggle('active',showGrid);draw();});
btnTheme.addEventListener('click',()=>{isDark=!isDark;document.documentElement.setAttribute('data-theme',isDark?'dark':'light');draw();});
btnDownload.addEventListener('click',downloadPNG);
new ResizeObserver(()=>draw()).observe(cWrap);
new ResizeObserver(()=>drawThumb()).observe(document.getElementById('diam-slider-wrap'));
window.addEventListener('resize',()=>draw());
setTrack(diameter);
requestAnimationFrame(()=>requestAnimationFrame(draw));
</script>
